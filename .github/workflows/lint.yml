name: nix

on:
  push:
    branches:
      - main
    paths:
      - "**.nix"
      - "flake.lock"
      - "flake.nix"
  pull_request:
    paths:
      - "**.nix"
      - "flake.lock"
      - "flake.nix"
  workflow_dispatch:

jobs:
  nix:
    name: checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Read Nix cache config
        id: caches
        run: |
          echo "substituters=$(jq -r '.substituters | join(" ")' system/nix/cache.json)" >> "$GITHUB_OUTPUT"
          echo "trusted-public-keys=$(jq -r '."trusted-public-keys" | join(" ")' system/nix/cache.json)" >> "$GITHUB_OUTPUT"

      - name: Install Nix
        uses: cachix/install-nix-action@v20
        with:
          install_url: https://nixos.org/nix/install
          extra_nix_config: |
            auto-optimise-store = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            experimental-features = nix-command flakes
            substituters = ${{ steps.caches.outputs.substituters }}
            trusted-public-keys = ${{ steps.caches.outputs.trusted-public-keys }}

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Nix flake check
        run: |
          nix flake check
