name: Upgrade Host

on:
  workflow_dispatch:
    inputs:
      host:
        description: "Target host (e.g. razer, oblak)"
        required: true
        type: string
      flake:
        description: "Flake attribute (defaults to host)"
        required: false
        type: string
  schedule:
    - cron: "0 3 * * 0"

jobs:
  upgrade:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host: ${{ github.event_name == 'schedule' && fromJSON('["razer", "oblak"]') || fromJSON(format('["{0}"]', inputs.host)) }}
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Restore Nix store cache
        uses: actions/cache@v4
        with:
          path: /nix
          key: nix-${{ hashFiles('flake.lock') }}
          restore-keys: nix-

      - name: Read Nix cache config
        id: caches
        run: |
          echo "substituters=$(jq -r '.substituters | join(" ")' system/nix/cache.json)" >> "$GITHUB_OUTPUT"
          echo "trusted-public-keys=$(jq -r '."trusted-public-keys" | join(" ")' system/nix/cache.json)" >> "$GITHUB_OUTPUT"

      - name: Install Nix
        uses: cachix/install-nix-action@v20
        with:
          install_url: https://nixos.org/nix/install
          extra_nix_config: |
            auto-optimise-store = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            experimental-features = nix-command flakes
            substituters = ${{ steps.caches.outputs.substituters }}
            trusted-public-keys = ${{ steps.caches.outputs.trusted-public-keys }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ matrix.host }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -T 30 ${{ matrix.host }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upgrade host
        run: |
          nix run nixpkgs#nixos-rebuild -- switch \
            --flake .#${{ inputs.flake || matrix.host }} \
            --target-host amadejk@${{ matrix.host }} \
            --sudo
