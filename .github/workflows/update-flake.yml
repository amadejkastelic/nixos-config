name: Update Nix Flake
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      inputs:
        description: "Flake inputs to update (space-separated, empty = all)"
        required: false
        type: string

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Read Nix cache config
        id: caches
        run: |
          echo "substituters=$(jq -r '.substituters | join(" ")' system/nix/cache.json)" >> "$GITHUB_OUTPUT"
          echo "trusted-public-keys=$(jq -r '."trusted-public-keys" | join(" ")' system/nix/cache.json)" >> "$GITHUB_OUTPUT"

      - name: Install Nix
        uses: cachix/install-nix-action@v20
        with:
          install_url: https://nixos.org/nix/install
          extra_nix_config: |
            auto-optimise-store = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            experimental-features = nix-command flakes
            substituters = ${{ steps.caches.outputs.substituters }}
            trusted-public-keys = ${{ steps.caches.outputs.trusted-public-keys }}

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Update flake.lock
        run: |
          if [ -n "${{ inputs.inputs }}" ]; then
            nix flake update ${{ inputs.inputs }}
          else
            nix flake update
          fi

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT_FOR_CI }}
          commit-message: "flake.lock: update"
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          sign-commits: true
          branch: update-flake
          delete-branch: true
          title: "flake.lock: update"
          body: |
            Automated daily update of `flake.lock`.

            **Triggered by:** ${{ github.actor }}
            **Event type:** ${{ github.event_name }}
          labels: |
            flake
            update
            automation

      - name: Approve PR
        if: steps.create-pr.outputs.pull-request-url
        run: gh pr review --approve "${{ steps.create-pr.outputs.pull-request-url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-url
        run: gh pr merge --auto --squash "${{ steps.create-pr.outputs.pull-request-url }}"
        env:
          GH_TOKEN: ${{ secrets.PAT_FOR_CI }}
