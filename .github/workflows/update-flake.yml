name: Update Nix Flake
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Read Nix cache config
        id: caches
        run: |
          echo "substituters=$(jq -r '.substituters | join(" ")' system/nix/cache.json)" >> "$GITHUB_OUTPUT"
          echo "trusted-public-keys=$(jq -r '."trusted-public-keys" | join(" ")' system/nix/cache.json)" >> "$GITHUB_OUTPUT"

      - name: Install Nix
        uses: cachix/install-nix-action@v20
        with:
          install_url: https://nixos.org/nix/install
          extra_nix_config: |
            auto-optimise-store = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            experimental-features = nix-command flakes
            substituters = ${{ steps.caches.outputs.substituters }}
            trusted-public-keys = ${{ steps.caches.outputs.trusted-public-keys }}

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Update flake.lock
        run: |
          nix flake update

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "flake.lock: update"
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          sign-commits: true
          branch: update-flake
          delete-branch: true
          title: "flake.lock: update"
          body: |
            Automated daily update of `flake.lock`.

            **Triggered by:** ${{ github.actor }}
            **Event type:** ${{ github.event_name }}
          labels: |
            flake
            update
            automation

      - name: Approve and enable auto-merge
        if: steps.create-pr.outputs.pull-request-url
        run: |
          gh pr review --approve "${{ steps.create-pr.outputs.pull-request-url }}"
          gh pr merge --auto --merge "${{ steps.create-pr.outputs.pull-request-url }}"
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          pending=$(gh api "repos/${{ github.repository }}/actions/runs?event=pull_request&status=waiting&per_page=100" \
            --jq ".workflow_runs[] | select(.pull_requests[].number == $PR_NUMBER) | .id")
          for run_id in $pending; do
            gh api "repos/${{ github.repository }}/actions/runs/$run_id/approve" -X POST
          done
        env:
          GH_TOKEN: ${{ secrets.PAT_FOR_CI }}
